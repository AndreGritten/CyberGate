<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CyberGate - Métricas</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="sidebar">
        <div class="logo">CyberGate OS</div>
        <ul class="nav-links">
            <li><a href="/">Visão Geral</a></li>
            <li><a href="/control.html">Controle</a></li>
            <li><a href="/logs.html">Logs</a></li>
            <li><a href="/metrics.html" class="active">Métricas</a></li>
        </ul>
    </nav>
    <main class="content">
        <h1>Desempenho e Observabilidade</h1>
        <p>Análise da memória e capacidade de concorrência</p>
        
        <div class="card full-card">
            <h3>Principais funções monitoradas</h3>
            <div class="table-container">
                <table class="perf-table">
                    <thead>
                        <tr>
                            <th>Função</th>
                            <th>Chamadas</th>
                            <th>Último</th>
                            <th>Média</th>
                            <th>Máximo</th>
                        </tr>
                    </thead>
                    <tbody id="perfTableBody">
                        <tr><td colspan="5">Carregando métricas...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card full-card">
            <h3>Histórico de memória livre</h3>
            <canvas id="memoryChartCanvas" style="width:100%; height:220px"></canvas>
            <div class="metric-label" style="margin-top:1rem;">Últimos pontos de heap usados</div>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        setInterval(() => fetchPerformance(), 2000);
        window.onload = fetchPerformance;
    </script>
</body>
</html>
