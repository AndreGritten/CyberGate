<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberGate - Status</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">CyberGate OS</div>
        <ul class="nav-links">
            <li><a href="/" class="active">Visão Geral</a></li>
            <li><a href="/control.html">Controle</a></li>
            <li><a href="/logs.html">Logs</a></li>
            <li><a href="/metrics.html">Métricas</a></li>
        </ul>
    </nav>
    <main class="content">
        <h1>Visão Geral do Sistema</h1>
        <p>Monitoramento em tempo real do acesso aos CyberGates</p>
        
        <div class="cards-grid">
            <div class="card">
                <h3>Status do Portão</h3>
                <div id="gateStatus" class="status-indicator loading">Verificando...</div>
            </div>
            
            <div class="card">
                <h3>Presença Veicular</h3>
                <div id="vehicleStatus" class="status-indicator loading">Verificando...</div>
            </div>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        // Especifico desta pagina: Padrão de autoupdate do painel inicial
        setInterval(() => fetchStatus(), 1000);
        window.onload = fetchStatus;
    </script>
</body>
</html>
